# network architecture

# encoder related
elayers: 12
eunits: 2048
# decoder related
dlayers: 6
dunits: 2048
# attention related
adim: 256
aheads: 4

# hybrid CTC/attention
mtlalpha: 0.3

# label smoothing
lsm-weight: 0.1

# minibatch related
batch-bins: 599200 # 15000000
# batch-size: 32
# maxlen-in: 512  # if input length  > maxlen-in, batchsize is automatically reduced
# maxlen-out: 150 # if output length > maxlen-out, batchsize is automatically reduced

# optimization related
sortagrad: 0 # Feed samples from shortest to longest ; -1: enabled for all epochs, 0: disabled, other: enabled for 'other' epochs
opt: noam
accum-grad: 2
grad-clip: 5
patience: 0
epochs: 100
dropout-rate: 0.1

dump-plot: True

# transformer specific setting
backend: chainer
model-module: "espnet.nets.chainer_backend.e2e_asr_transformer_wave:E2E"
transformer-input-layer: sinc_conv     # encoder architecture type
transformer-lr: 10.0
transformer-warmup-steps: 25000
transformer-attn-dropout-rate: 0.0
transformer-length-normalized-loss: false
transformer-init: pytorch

# Report CER & WER
report-cer: false
report-wer: false

freq-samp: 8000
filter-length: 257
hop-length: 80
